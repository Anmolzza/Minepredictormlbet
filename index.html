<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINE PREDICTOR | Premium Edition</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="background-overlay"></div>
    
    <main class="container">
        <header>
            <div class="logo-wrapper">
                <i data-lucide="scan-search" class="logo-icon"></i>
                <h1 class="glitch-text" data-text="MINE PREDICTOR">MINE PREDICTOR</h1>
            </div>
            <p class="subtitle">Next-Gen ID Sequence Prediction Engine</p>
        </header>

        <section class="prediction-hub">
            <div class="input-card card">
                <div class="input-header">
                    <label for="mine-id">Session ID Sequence</label>
                    <span class="status-indicator" id="connection-status">
                        <span class="dot pulse"></span> Secure Connection
                    </span>
                </div>
                <div class="input-wrapper">
                    <i data-lucide="key-round" class="input-icon"></i>
                    <input type="text" id="mine-id" placeholder="Enter Mine ID (e.g., #b7a9...)" autocomplete="off">
                </div>

                <div class="control-wrapper">
                    <label for="gem-count">Gems to Predict (1-10)</label>
                    <div class="range-wrapper">
                        <input type="range" id="gem-count" min="1" max="10" value="3">
                        <span id="gem-count-val" class="text-accent">3 Gems</span>
                    </div>
                </div>

                <button id="predict-btn" class="btn-primary">
                    <span class="btn-text">INITIALIZE PREDICTION</span>
                    <i data-lucide="zap" class="btn-icon"></i>
                </button>
            </div>

            <div class="grid-card card">
                <div class="grid-stats">
                    <div class="stat">
                        <span class="stat-label">Prediction Accuracy</span>
                        <span class="stat-value text-accent">98.4%</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Algorithm</span>
                        <span class="stat-value">v4.2.0-PRO</span>
                    </div>
                </div>
                
                <div class="mine-grid" id="mine-grid">
                    <!-- Grid cells will be generated by JS -->
                </div>

                <div class="status-bar" id="status-bar">
                    <div class="status-msg">System Ready: Awaiting Input</div>
                </div>
            </div>
        </section>

        <footer>
            <div class="footer-content">
                <div class="footer-item"><i data-lucide="shield-check"></i> AES-256 Encryption</div>
                <div class="footer-item"><i data-lucide="database"></i> Real-time Feed</div>
                <div class="footer-item"><i data-lucide="cpu"></i> AI-Optimized</div>
            </div>
        </footer>
    </main>

    <div class="scanline"></div>
    <script src="script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
